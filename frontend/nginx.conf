server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o backend FastAPI
    location ~ ^/(auth|users|eleicoes|candidatos|candidaturas|partidos|resultados|secoes|importar|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Necessário para SSE (streaming de importação)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }
}
