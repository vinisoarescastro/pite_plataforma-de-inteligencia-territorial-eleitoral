services:

  # Banco de dados principal: PostgreSQL com extensão PostGIS para dados geográficos
  banco_dados:
    image: postgis/postgis:16-3.4
    container_name: pite_banco_dados
    restart: unless-stopped
    environment:
      POSTGRES_DB: pite_db
      POSTGRES_USER: pite_usuario
      POSTGRES_PASSWORD: pite_senha_local
    ports:
      - "5432:5432"       # porta_do_seu_windows:porta_dentro_do_container
    volumes:
      - dados_postgres:/var/lib/postgresql/data   # persiste os dados entre reinicializações

  # Cache: Redis para consultas frequentes e sessões JWT
  # Opcional no MVP — pode ser habilitado conforme necessário
  cache:
    image: redis:7-alpine
    container_name: pite_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dados_redis:/data

volumes:
  dados_postgres:
  dados_redis:

# ---------------------------------------------------------------------------
# COMO USAR:
#
#   Subir tudo:          docker compose up -d
#   Parar tudo:          docker compose down
#   Ver logs:            docker compose logs -f
#   Resetar banco:       docker compose down -v  (APAGA TODOS OS DADOS)
#
# O backend Python e o frontend React rodam fora do Docker durante o
# desenvolvimento — veja as instruções no README.md.
#
# Conexão com o banco (use DBeaver ou outro cliente):
#   Host:     localhost
#   Porta:    5432
#   Banco:    pite_db
#   Usuário:  pite_usuario
#   Senha:    pite_senha_local
# ---------------------------------------------------------------------------
